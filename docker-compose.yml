services:
  db:
    image: postgres:16
    container_name: fashion_store_db
    restart: always
    environment:
      POSTGRES_DB: fashion_store_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fashion_store_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: fashion_store_api
    restart: always
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
