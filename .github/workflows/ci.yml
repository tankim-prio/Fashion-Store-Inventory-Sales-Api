name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fashion_store_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fashion_store_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:12345@localhost:5432/fashion_store_db
      SECRET_KEY: github_actions_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      OLLAMA_MODEL: qwen2.5:3b
      OLLAMA_URL: http://127.0.0.1:11434/api/generate
      OLLAMA_TIMEOUT_SECONDS: 5
      OLLAMA_KEEP_ALIVE: 30m
      AI_OLLAMA_FIRST: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed demo data
        run: python seed_demo_data.py

      - name: Run tests
        run: python -m pytest -v

  docker-build:
    name: Check Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fashion-store-inventory-sales-api .
